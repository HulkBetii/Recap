name: Release Gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install development runtime
        shell: pwsh
        run: python -m pip install -e ".[dev]"

      - name: Run offline release gate
        shell: pwsh
        run: ./scripts/release_check.ps1 -SkipMediaSmoke

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ github.sha }}
          path: |
            work/release-gate/report.json
            work/release-gate/tach-report.txt
            work/release-gate/secret-report.json
            work/release-gate/package-report.json
            work/release-gate/wheel/*.whl
          if-no-files-found: warn
