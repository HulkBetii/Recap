# Proposed Reaction Remix preset. The current Recap config loader does not
# understand this file. Do not use it with run.py.
schema_version: reaction-remix.proposed.v1
pipeline: reaction_remix

orchestrator:
  python: null
  log_level: INFO
  api_budget_guard: block
  text_llm_backend: chatgpt_playwright
  runtime_preflight: true

probe:
  soft_subtitle_policy: warn
  preserve_source_resolution: true
  preserve_source_fps: true

analyze:
  asr_provider: faster-whisper
  whisper_model: large-v3
  device: cuda
  source_language: auto
  chunk_s: 30.0
  vad_filter: true
  language_id: local
  speaker_hints: local

shots:
  enabled: true
  purpose: cut_hints_only
  detector: adaptive
  frame_sampling: batch

stems:
  enabled: true
  provider: demucs
  model: htdemucs
  device: cuda
  output_stem: no_vocals
  fallback: tts_only

segment:
  min_silence_s: 0.25
  speech_padding_s: 0.12
  scene_cut_tolerance_s: 0.5
  commentary_min_confidence: 0.9
  unknown_policy: preserve_source
  allow_reaction_trim: safe_cut_points_only

plan:
  llm_backend: chatgpt_playwright
  chatgpt_profile_dir: D:/VibeCoding/auto_YT/data/chrome_user_data/PROFILE_GPT_1
  chat_session_policy: auto
  playwright_max_attempts: 2
  playwright_recovery_timeout_s: 60
  reply_timeout_s: 900
  hard_min_output_ratio: 0.8
  preferred_min_output_ratio: 0.85
  preferred_max_output_ratio: 0.9
  hard_max_output_ratio: 1.0
  min_unique_reaction_speech_ratio: 0.9
  reorder_independent_reactions: true
  preserve_sequence_groups: true

write:
  llm_backend: chatgpt_playwright
  language: ja
  style_id: reaction-internet-ja-v1
  tone_tags:
    - お前ら
    - ネキ
    - ニキ
    - ワイ
    - humorous
    - ironic
  require_evidence_block_ids: true
  max_fit_iterations: 2

tts:
  provider_mode: ai33
  voice_id: elevenlabs_QPtBgsg1dxKTQHNpHrHt
  model: eleven_multilingual_v2
  speed: 1.0
  fallback_provider: null
  text_normalization: basic
  normalize: true
  concurrency: 1
  save_manifest_after_each_slot: true

compose:
  reaction_audio_mode: source
  reaction_source_gain_db: 0.0
  reaction_speed: 1.0
  commentary_audio_mode: tts_bed
  commentary_visual_priority:
    - broll
    - transition
    - commentary
  commentary_bed_gain_db: -14.0
  commentary_tts_gain_db: 1.0
  commentary_bed_fade_ms: 180
  commentary_limiter_dbfs: -1.5
  mask_subtitles: false
  add_subtitles: false
  add_text: false
  blur: false
  overlay: false

render:
  width: source
  height: source
  fps: source
  video_codec: libx264
  pixel_format: yuv420p
  crf: 20
  preset: medium
  audio_codec: aac
  audio_bitrate: 192k
  audio_sample_rate: source
  global_audio_normalization: false
  visual_filter_policy: none

qa:
  min_output_ratio: 0.8
  preferred_output_ratio:
    - 0.85
    - 0.9
  min_unique_reaction_speech_ratio: 0.9
  min_reaction_audio_correlation: 0.98
  max_reaction_av_drift_ms: 33.4
  min_sample_frame_similarity: 0.995
  min_tts_asr_text_match: 0.9
  old_narrator_leakage_max_count: 0
  fail_on_visual_edit: true
  fail_on_decode_error: true
  auto_repair: true
