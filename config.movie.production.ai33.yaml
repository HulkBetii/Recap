orchestrator:
  quality_mode: balanced
  text_llm_backend: chatgpt_playwright
  api_budget_guard: warn
  auto_fallback: false
  fallback_on_timecode_warn: true
  fallback_ingest_asr_provider: openai-gpt4o-hybrid
  fallback_max_vision_frames: 0
  runtime_preflight: true
  python: null
  log_level: INFO

preflight:
  enabled: true
  max_intro_s: 240
  sample_every_s: 5
  classifier: heuristic
  confidence_threshold: 0.75
  uncertain_threshold: 0.55
  log_level: INFO

ingest:
  whisper_model: large-v3
  gap_threshold: 4.0
  max_vision_frames: 200
  max_visual_gap_s: 20
  translate_model: gpt-4.1-mini
  source_language: ko
  translate_mode: ko-en
  vision_model: gpt-4.1-mini
  device: cuda
  asr_policy: preset
  asr_provider: faster-whisper
  aligner: whisperx
  transcript_input: null
  timecode_quality: strict
  max_segment_s: 30
  merge_gap_s: 0
  vad_filter: true
  openai_transcribe_model: gpt-4o-mini-transcribe
  openai_chunk_s: 20
  alignment_device: cuda
  transcript_correction: off
  glossary: null
  correction_model: gpt-4.1-mini
  drop_non_korean_intro_s: 30
  drop_visual_before_s: 0
  log_level: INFO

storymap:
  enabled: true
  content_type: movie
  target_story_sections: 7
  log_level: INFO

review:
  content_type: movie
  hook_mode: setup
  target_ratio: auto
  auto_max_ratio: 0.40
  auto_soft_cap_s: 2100
  auto_hard_cap_s: 2700
  auto_long_score_threshold: 0.80
  tts_cps: 15
  min_coverage: 0.85
  max_qa_iterations: 2
  max_qa_rewrites_per_iteration: 6
  opening_coherence_qa: true
  micro_beats: false
  target_beat_audio_s: 12
  max_beat_audio_s: 18
  story_map: auto
  review_intent_output: null
  chatgpt_profile_dir: "D:\\VibeCoding\\auto_YT\\data\\chrome_user_data\\PROFILE_GPT_1"
  chat_session_policy: auto
  chat_session_meta: null
  chat_title: null
  reply_timeout_s: 900
  style_sample: examples/style/viral_recap_vi.cleaned.txt
  style_preset: viral-recap-vi
  style_strength: strong
  style_qa: true
  target_sentence_chars: 160
  max_sentence_chars: 220
  drop_non_story_beats: true
  non_story_tail_s: 300
  headless: false
  log_level: INFO

tts:
  voice_id: vbee_hn_female_ngochuyen_full_24k-st
  provider_mode: ai33
  genmax_voice_id: null
  model: eleven_multilingual_v2
  openai_model: gpt-4o-mini-tts
  openai_voice: coral
  speed: 1.0
  inter_beat_pause: 0.15
  concurrency: 1
  normalize: true
  cost_per_1k_chars: 0.0
  text_normalization: vi
  pronunciation_lexicon: null
  normalized_script_output: null
  normalization_report: null
  pronunciation_qa: true
  pronunciation_qa_output: null
  pronunciation_suggest_backend: null
  lexicon_candidates_output: null
  log_level: INFO

shots:
  detector: ffmpeg-scene
  min_shot_len: 0.4
  sample_frames: 5
  frame_sampling: batch
  face_detection: "on"
  min_brightness: 0.06
  end_credit_guard: true
  end_credit_tail_s: 600
  end_credit_threshold: 0.60
  skip_intro: 0
  skip_outro: 0
  downscale: auto
  scene_threshold: 0.3
  scene_scale_width: 640
  scene_min_gap: 0.3
  max_shot_len: 8
  log_level: INFO

visual_index:
  enabled: true
  embedding_mode: siglip2
  embedding_model: google/siglip2-base-patch16-384
  device: cuda
  batch_size: 16
  keyframes_per_shot: 2
  frame_sampling: batch
  log_level: INFO

match:
  min_clip: 3.0
  max_clip: 5.0
  min_visual_clip: 0.6
  widen_margin: 15
  max_widen: 3
  allow_dark_fallback: true
  content_anchors: true
  allow_repeat: true
  allow_speedfit: false
  exclude_non_story: true
  exclude_end_credits: true
  max_repeat_per_beat: 2
  max_repeat_ratio_per_beat: 0.35
  min_repeat_alternative_score_ratio: 0.75
  adjacent_shot_repeat_penalty: 0.50
  opening_guard_s: 120
  opening_max_repeat_ratio: 0.20
  opening_max_repeat_per_shot: 1
  opening_min_unique_shots: 4
  opening_story_visual_start: true
  opening_allow_short_fill: true
  seed: 1234
  w_motion: 0.60
  w_face: 0.18
  w_bright: 0.12
  w_reuse: 0.35
  w_semantic: 0.15
  w_visual: 0.15
  min_semantic_score: 0.22
  match_strategy: chronological
  chronology_weight: 0.70
  max_source_drift_s: 12
  semantic_mode: bge-m3
  semantic_model: BAAI/bge-m3
  semantic_device: cuda
  semantic_batch_size: 16
  semantic_cache_dir: null
  visual_mode: rerank
  visual_index: auto
  visual_cache_dir: null
  visual_device: cuda
  visual_batch_size: 32
  sentence_refinement_mode: guarded
  output_visual_qa: null
  film_map: auto
  output_qa: null
  output_review_html: null
  review_asset_dir: null
  review_thumbs_per_beat: 8
  review_intent: auto
  story_map: auto
  opening_ordered_fill: true
  opening_intra_beat_align: true
  hook_min_brightness: 0.10
  ordered_fill_by_audio_progress: true
  review_html: true
  log_level: INFO

render:
  width: 1920
  height: 1080
  fps: 30
  fit: cover
  crf: 20
  preset: medium
  concurrency: 4
  audio_delay_s: 0.0
  log_level: INFO
